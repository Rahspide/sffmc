version: 1
rules:
  # Allow common read-only ops by default
  - match: { tool: read }
    action: allow
  - match: { tool: glob }
    action: allow
  - match: { tool: grep }
    action: allow
  - match: { tool: list }
    action: allow
  # Writes inside project root: allow
  - match: { tool: write }
    action: allow
  - match: { tool: edit }
    action: allow
  # Writes outside project root: deny
  - match:
      tool: write
      path_outside: PROJECT_ROOT
    action: deny
  - match:
      tool: edit
      path_outside: PROJECT_ROOT
    action: deny
  # Catastrophic bash: deny (MUST come before general destructive)
  - match:
      tool: bash
      command_match: "rm -rf /|chmod -R 777 /|mkfs\\."
    action: deny
  # Destructive bash: ask
  - match:
      tool: bash
      command_match: "rm -rf|chmod 777|chmod -R|dd if=|mkfs|DROP TABLE|TRUNCATE|git push --force|git reset --hard|>|sudo "
    action: ask
