name: CI

on:
  push:
    branches: [main, release/**]
  pull_request:
    branches: [main]

jobs:
  precommit:
    name: precommit chain
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - name: test
        run: bun run test:all

      - name: load-order audit
        run: python3 scripts/audit-load-order.py

      - name: public-content audit
        run: bun run audit:public

      - name: redos audit
        run: bun run audit:redos

      - name: cleanroom check
        run: bun run check:cleanroom

      - name: health check
        run: bun run scripts/run-health.ts
