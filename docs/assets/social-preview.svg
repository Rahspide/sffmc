<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo text -->
  <text x="600" y="280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
        font-size="96" font-weight="700" fill="url(#g)" text-anchor="middle" letter-spacing="8">
    SFFMC
  </text>

  <!-- Tagline -->
  <text x="600" y="340" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
        font-size="24" fill="#64748b" text-anchor="middle" letter-spacing="3">
    Some Features From MiMo Code
  </text>

  <!-- Package badges -->
  <g font-family="ui-monospace, monospace" font-size="16" fill="#94a3b8">
    <text x="600" y="420" text-anchor="middle" letter-spacing="2">@sffmc/runtime  @sffmc/cognition  @sffmc/memory</text>
    <text x="600" y="450" text-anchor="middle" letter-spacing="2">@sffmc/safety  @sffmc/utilities</text>
  </g>

  <!-- Footer -->
  <text x="600" y="540" font-family="ui-monospace, monospace" font-size="14" fill="#475569"
        text-anchor="middle" letter-spacing="2">
    MIT licensed  ·  Bun-powered  ·  OpenCode plugins
  </text>

  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" stroke="url(#g)" stroke-width="2" opacity="0.15"/>
</svg>
